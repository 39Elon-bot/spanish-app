<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>¡Hablemos! — 半年でスペイン語会話</title>
  <meta name="description" content="半年でスペイン語ネイティブと会話できるようになる学習アプリ">
  <meta name="theme-color" content="#e63946">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="¡Hablemos!">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="stat" id="stat-streak" title="連続学習日数">🔥 <span>0</span></div>
      <div class="stat" id="stat-level" title="レベル">🏅 <span>Lv.1</span></div>
      <div class="stat" id="stat-xp" title="経験値">⭐ <span>0</span> XP</div>
    </header>

    <main id="screen"><!-- 画面はJSで描画 --></main>

    <nav id="tabbar">
      <button class="tab active" data-tab="home"><span class="tab-icon">🏠</span><span class="tab-label">ホーム</span></button>
      <button class="tab" data-tab="review"><span class="tab-icon">🔁</span><span class="tab-label">復習</span></button>
      <button class="tab" data-tab="settings"><span class="tab-icon">⚙️</span><span class="tab-label">設定</span></button>
    </nav>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
